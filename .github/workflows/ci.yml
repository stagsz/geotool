name: CI

on:
  push:
  pull_request:

jobs:
  proxy-core:
    name: proxy-core — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run lint

      - name: Unit tests
        run: npm test
